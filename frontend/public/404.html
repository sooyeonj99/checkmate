<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Checkmate</title>
    <script>
      // GitHub Pages SPA 404 리다이렉트
      // /checkmate/upload → /checkmate/?/upload → React Router가 처리
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
